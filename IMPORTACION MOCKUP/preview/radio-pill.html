<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Radio pill</title></head>
<body><div class="card">
<div class="label">Radio pill · Valorizado / Unidades</div>
<div style="display:flex;gap:10px">
  <label style="background:rgba(59,130,246,.09);border:1px solid rgba(59,130,246,.65);border-radius:14px;padding:10px 16px;box-shadow:0 12px 28px rgba(59,130,246,.10);display:flex;gap:10px;align-items:center">
    <span style="width:18px;height:18px;border-radius:50%;border:1.5px solid #3b82f6;background:rgba(59,130,246,.10);display:inline-flex;align-items:center;justify-content:center"><span style="width:8px;height:8px;border-radius:50%;background:#3b82f6"></span></span>
    <span style="color:#14233b;font-weight:600;font-size:14px">Valorizado</span>
  </label>
  <label style="background:rgba(255,255,255,.76);border:1px solid rgba(30,58,138,.12);border-radius:14px;padding:10px 16px;box-shadow:0 6px 18px rgba(30,58,138,.04);display:flex;gap:10px;align-items:center">
    <span style="width:18px;height:18px;border-radius:50%;background:#fff;border:1.5px solid rgba(20,35,59,.22);box-shadow:inset 0 0 0 3px #fff"></span>
    <span style="color:#14233b;font-weight:600;font-size:14px">Unidades</span>
  </label>
  <label style="background:rgba(255,255,255,.76);border:1px solid rgba(30,58,138,.12);border-radius:14px;padding:10px 16px;box-shadow:0 6px 18px rgba(30,58,138,.04);display:flex;gap:10px;align-items:center">
    <span style="width:18px;height:18px;border-radius:50%;background:#fff;border:1.5px solid rgba(20,35,59,.22);box-shadow:inset 0 0 0 3px #fff"></span>
    <span style="color:#14233b;font-weight:600;font-size:14px">Meses</span>
  </label>
</div>
</div></body></html>

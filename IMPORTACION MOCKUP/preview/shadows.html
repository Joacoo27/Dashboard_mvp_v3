<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Shadows</title></head>
<body><div class="card">
<div class="label">Elevation system</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:10px 2px">
  <div style="background:#fff;border:1px solid rgba(30,58,138,.12);border-radius:14px;padding:14px;height:72px;box-shadow:0 10px 30px rgba(20,35,59,.05)">
    <div style="font-size:12px;font-weight:800;color:#14233b">Soft</div><div style="font-size:10px;color:#64748b;font-family:var(--iw-font-mono)">0 10 30 rgba(20,35,59,.05)</div>
  </div>
  <div style="background:#fff;border:1px solid rgba(30,58,138,.12);border-radius:16px;padding:14px;height:72px;box-shadow:0 8px 32px rgba(31,38,135,.05)">
    <div style="font-size:12px;font-weight:800;color:#14233b">Card</div><div style="font-size:10px;color:#64748b;font-family:var(--iw-font-mono)">0 8 32 rgba(31,38,135,.05)</div>
  </div>
  <div style="background:#fff;border:1px solid rgba(30,58,138,.08);border-radius:22px;padding:14px;height:72px;box-shadow:0 16px 40px rgba(20,35,59,.06)">
    <div style="font-size:12px;font-weight:800;color:#14233b">Lift (chart)</div><div style="font-size:10px;color:#64748b;font-family:var(--iw-font-mono)">0 16 40 rgba(20,35,59,.06)</div>
  </div>
  <div style="background:#fff;border:1px solid rgba(30,58,138,.12);border-radius:14px;padding:14px;height:72px;box-shadow:0 18px 38px rgba(20,35,59,.10)">
    <div style="font-size:12px;font-weight:800;color:#14233b">Strong (hover)</div><div style="font-size:10px;color:#64748b;font-family:var(--iw-font-mono)">0 18 38 rgba(20,35,59,.10)</div>
  </div>
  <div style="background:#0A1261;color:#fff;border-radius:12px;padding:14px;height:72px;box-shadow:0 10px 30px rgba(20,35,59,.14);border-left:6px solid #3b82f6">
    <div style="font-size:12px;font-weight:800">Band</div><div style="font-size:10px;opacity:.85;font-family:var(--iw-font-mono)">0 10 30 rgba(20,35,59,.14)</div>
  </div>
  <div style="background:#0A1261;color:#fff;border-radius:14px;padding:14px;height:72px;box-shadow:0 16px 34px rgba(10,18,97,.22)">
    <div style="font-size:12px;font-weight:800">Navy CTA</div><div style="font-size:10px;opacity:.85;font-family:var(--iw-font-mono)">0 16 34 rgba(10,18,97,.22)</div>
  </div>
</div>
</div></body></html>

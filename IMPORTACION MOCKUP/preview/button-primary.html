<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Button primary</title></head>
<body><div class="card">
<div class="label">Primary · navy CTA</div>
<div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
  <button style="background:#0A1261;color:#fff;border:1px solid rgba(10,18,97,.95);border-radius:14px;height:51px;padding:0 24px;font-family:var(--iw-font-sans);font-weight:900;font-size:15px;box-shadow:0 16px 34px rgba(10,18,97,.22);cursor:pointer">Inventario y Ventas</button>

  <button style="background:rgba(59,130,246,.85);color:#fff;border:1px solid rgba(59,130,246,.4);border-radius:12px;height:42px;padding:0 18px;font-family:var(--iw-font-sans);font-weight:700;font-size:14px;cursor:pointer">✅ Aplicar Fechas</button>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Info capsule</title></head>
<body><div class="card">
<div class="label">Info capsule · pulsing "i" + popover</div>
<style>@keyframes pulseblue{0%{box-shadow:0 0 0 0 rgba(96,165,250,.6)}70%{box-shadow:0 0 0 10px rgba(96,165,250,0)}100%{box-shadow:0 0 0 0 rgba(96,165,250,0)}}</style>
<div style="display:flex;gap:12px;align-items:center;position:relative">
  <div style="color:#111827;font-size:24px;font-weight:800">Evolutivo de Ingresos</div>
  <div style="background:#0A1261;border:2px solid rgba(255,255,255,.3);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;box-shadow:0 4px 12px rgba(10,18,97,.3);animation:pulseblue 2s infinite">i</div>
</div>
<div style="margin-top:14px;max-width:320px;background:rgba(255,255,255,.98);border:1px solid rgba(10,18,97,.15);border-radius:20px;padding:18px 20px;box-shadow:0 20px 50px rgba(10,18,97,.2);backdrop-filter:blur(15px)">
  <div style="color:#0A1261;font-size:14px;font-weight:800;margin-bottom:6px">📊 Evolutivo de Ingresos</div>
  <div style="color:#475569;font-size:12.5px;line-height:1.5;font-weight:500"><b>Descripción:</b> Trayectoria de ingresos reales vs presupuesto.<br><b>Metodología:</b> Real (barras) vs Presupuesto (línea roja).</div>
</div>
</div></body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Flip card</title></head>
<body><div class="card">
<div class="label">Flip card · reverse · explica la lógica de negocio</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
  <div style="background:rgba(255,255,255,.95);border:1px solid rgba(0,0,0,.05);border-radius:16px;padding:20px;height:170px;box-shadow:0 8px 32px rgba(31,38,135,.05);text-align:center;display:flex;flex-direction:column;justify-content:center;gap:6px">
    <div style="color:#64748b;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px">EBITDA</div>
    <div style="color:#14233b;font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-0.01em">$82.4M</div>
    <div style="color:#2bb673;font-size:13px;font-weight:700">▲ 6.8% vs referencia</div>
    <div style="color:#94a3b8;font-size:11px;font-weight:600">Haz clic para ver explicación</div>
  </div>
  <div style="background:#0A1261;color:#fff;border-radius:16px;padding:22px;height:170px;box-shadow:0 8px 32px rgba(31,38,135,.05);text-align:center;display:flex;flex-direction:column;justify-content:center;gap:10px">
    <div style="color:#60a5fa;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px">EBITDA</div>
    <div style="color:rgba(255,255,255,.9);font-size:13px;line-height:1.45;font-weight:500">Beneficio antes de intereses, impuestos, depreciaciones y amortizaciones. Refleja la rentabilidad operativa pura del negocio.</div>
    <div style="color:rgba(255,255,255,.55);font-size:11px;font-weight:600">Haz clic para volver</div>
  </div>
</div>
</div></body></html>

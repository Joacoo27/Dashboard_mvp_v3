<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><title>Spacing & radii</title></head>
<body><div class="card">
<div class="label">Radii</div>
<div class="row" style="align-items:center">
  <div style="width:60px;height:44px;background:#0A1261;border-radius:12px"></div>
  <div style="width:60px;height:44px;background:#1e3a8a;border-radius:14px"></div>
  <div style="width:60px;height:44px;background:#3b82f6;border-radius:16px"></div>
  <div style="width:60px;height:44px;background:#60a5fa;border-radius:18px"></div>
  <div style="width:60px;height:44px;background:#94a3b8;border-radius:22px"></div>
  <div style="width:60px;height:44px;background:#64748b;border-radius:24px"></div>
  <div style="width:60px;height:44px;background:#0A1261;border-radius:999px"></div>
</div>
<div style="font-size:11px;font-weight:600;color:#64748b;margin-top:6px;display:flex;gap:26px;font-family:var(--iw-font-mono)"><span>12</span><span>14</span><span>16</span><span>18</span><span>22</span><span>24</span><span>pill</span></div>
<div style="height:14px"></div>
<div class="label">Spacing (px)</div>
<div style="display:flex;gap:8px;align-items:flex-end">
  <div style="width:4px;height:20px;background:#3b82f6"></div>
  <div style="width:8px;height:28px;background:#3b82f6"></div>
  <div style="width:12px;height:36px;background:#3b82f6"></div>
  <div style="width:16px;height:44px;background:#3b82f6"></div>
  <div style="width:20px;height:52px;background:#3b82f6"></div>
  <div style="width:24px;height:60px;background:#3b82f6"></div>
  <div style="width:32px;height:68px;background:#3b82f6"></div>
  <div style="width:40px;height:76px;background:#3b82f6"></div>
</div>
<div style="font-size:11px;font-weight:600;color:#64748b;margin-top:4px;display:flex;gap:6px;font-family:var(--iw-font-mono)"><span style="width:4px">4</span><span style="width:8px">8</span><span style="width:12px">12</span><span style="width:16px">16</span><span style="width:20px">20</span><span style="width:24px">24</span><span style="width:32px">32</span><span style="width:40px">40</span></div>
</div></body></html>
